name: Flutter APK CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read Flutter project metadata
        run: |
          PROJECT_NAME="$(awk '/^name:/ { print $2; exit }' pubspec.yaml)"
          if [ -z "$PROJECT_NAME" ]; then
            echo "Could not read project name from pubspec.yaml"
            exit 1
          fi
          ARTIFACT_NAME="$(printf '%s-release-apk' "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_-' '-')"
          echo "PROJECT_NAME=$PROJECT_NAME" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/app-release.apk
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/app-release.apk
          if-no-files-found: error
