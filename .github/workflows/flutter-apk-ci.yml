name: Flutter APK CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flutter-apk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read Flutter project metadata
        run: |
          PROJECT_NAME="$(awk '/^name:/ { print $2; exit }' pubspec.yaml)"
          if [ -z "$PROJECT_NAME" ]; then
            echo "Could not read project name from pubspec.yaml"
            exit 1
          fi
          ARTIFACT_NAME="$(printf '%s-release-apk' "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_-' '-')"
          echo "PROJECT_NAME=$PROJECT_NAME" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/app-release.apk
          ls -lh dist/

      - name: Auto-commit APK artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/app-release.apk
          if ! git diff --cached --quiet; then
            ORIGINAL_HEAD="$(git rev-parse HEAD)"
            git commit -m "chore(ci): auto-update APK [skip ci]"
            if ! git fetch origin "${{ github.ref_name }}"; then
              echo "Could not fetch ${{ github.ref_name }} to verify conditions for pushing the APK commit."
              exit 1
            fi
            if [ "$ORIGINAL_HEAD" != "$(git rev-parse FETCH_HEAD)" ]; then
              echo "Branch changed after checkout; skipping this APK commit so the latest workflow run can publish the current APK."
              exit 0
            fi
            if ! git push origin "HEAD:${{ github.ref_name }}"; then
              if git fetch origin "${{ github.ref_name }}" && [ "$ORIGINAL_HEAD" != "$(git rev-parse FETCH_HEAD)" ]; then
                echo "Could not push APK commit because the branch changed; the newer workflow run should publish the latest APK."
                exit 0
              fi
              echo "Could not push APK commit to ${{ github.ref_name }}."
              exit 1
            fi
          else
            echo "No APK changes to commit"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/app-release.apk
          if-no-files-found: error
