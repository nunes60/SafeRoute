name: Flutter Build and Release

on:
  push:
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flutter-build-and-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyze
        run: flutter analyze

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Configure Android release signing
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0

          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing Android signing secret::$secret_name is not configured."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android APK
        id: build_android
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            flutter build apk --debug
            echo "apk_path=build/app/outputs/flutter-apk/app-debug.apk" >> "$GITHUB_OUTPUT"
          else
            flutter build apk --release
            echo "apk_path=build/app/outputs/flutter-apk/app-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up Android signing files
        if: always() && github.event_name != 'pull_request'
        run: rm -f android/key.properties android/upload-keystore.jks

      - name: Upload Android build artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-raw
          path: ${{ steps.build_android.outputs.apk_path }}
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web bundle
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build-raw
          path: build/web
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Windows project exists
        run: |
          if (-not (Test-Path windows)) {
            flutter create --platforms=windows .
          }

      - name: Build Windows release bundle
        run: |
          flutter build windows --release

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-raw
          path: build/windows/x64/runner/Release
          if-no-files-found: error

  publish-builds:
    name: Package and publish builds
    needs:
      - build-android
      - build-web
      - build-windows
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Download Android build artifact
        uses: actions/download-artifact@v8
        with:
          name: android-apk-raw
          path: artifacts/android

      - name: Download web build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-build-raw
          path: artifacts/web

      - name: Download Windows build artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-build-raw
          path: artifacts/windows

      - name: Prepare packaged artifacts
        id: package_artifacts
        run: |
          PROJECT_NAME="$(awk '/^name:/ { print $2; exit }' pubspec.yaml)"
          VERSION_LINE="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          APP_VERSION="${VERSION_LINE%%+*}"
          SAFE_NAME="$(printf '%s' "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_-' '-')"
          RELEASE_TAG=""

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          fi

          mkdir -p dist release-assets
          rm -f dist/app-release.apk "dist/${SAFE_NAME}-web.zip" "dist/${SAFE_NAME}-windows.zip"
          cp artifacts/android/app-release.apk dist/app-release.apk
          (
            cd artifacts/web
            zip -r "$GITHUB_WORKSPACE/dist/${SAFE_NAME}-web.zip" .
          )
          (
            cd artifacts/windows
            zip -r "$GITHUB_WORKSPACE/dist/${SAFE_NAME}-windows.zip" .
          )

          RELEASE_LABEL="${RELEASE_TAG:-$APP_VERSION}"
          cp dist/app-release.apk "release-assets/${SAFE_NAME}-${RELEASE_LABEL}-android.apk"
          cp "dist/${SAFE_NAME}-web.zip" "release-assets/${SAFE_NAME}-${RELEASE_LABEL}-web.zip"
          cp "dist/${SAFE_NAME}-windows.zip" "release-assets/${SAFE_NAME}-${RELEASE_LABEL}-windows.zip"

          echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packaged-builds
          path: |
            dist/app-release.apk
            dist/${{ steps.package_artifacts.outputs.safe_name }}-web.zip
            dist/${{ steps.package_artifacts.outputs.safe_name }}-windows.zip
          if-no-files-found: error

      - name: Commit packaged builds to repository
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME}"

          git add dist/app-release.apk
          git add "dist/${{ steps.package_artifacts.outputs.safe_name }}-web.zip"
          git add "dist/${{ steps.package_artifacts.outputs.safe_name }}-windows.zip"

          if ! git diff --cached --quiet; then
            ORIGINAL_HEAD="$(git rev-parse HEAD)"
            git commit -m "chore(ci): update packaged builds [skip ci]"

            if ! git fetch origin "$BRANCH"; then
              echo "Could not fetch $BRANCH to verify the push precondition."
              exit 1
            fi

            if [ "$ORIGINAL_HEAD" != "$(git rev-parse FETCH_HEAD)" ]; then
              echo "Branch changed after checkout; skipping artifact commit so a newer workflow run can publish fresher builds."
              exit 0
            fi

            if ! git push origin "HEAD:$BRANCH"; then
              if git fetch origin "$BRANCH" && [ "$ORIGINAL_HEAD" != "$(git rev-parse FETCH_HEAD)" ]; then
                echo "Could not push artifacts because the branch changed; a newer workflow run should publish the latest builds."
                exit 0
              fi

              echo "Could not push packaged artifacts to $BRANCH."
              exit 1
            fi
          else
            echo "No packaged artifact changes to commit"
          fi

      - name: Create or update GitHub release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: release-assets/*
          generateReleaseNotes: true
          name: ${{ steps.package_artifacts.outputs.release_tag || steps.package_artifacts.outputs.app_version }}
          replacesArtifacts: true
          tag: ${{ steps.package_artifacts.outputs.release_tag || github.ref_name }}